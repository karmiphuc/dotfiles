# Portable Codex profile.
# Keep secrets, local runtime paths, project trust entries, session state, and caches out of dotfiles.

personality = "pragmatic"
service_tier = "priority"
model = "gpt-5.5"
model_reasoning_effort = "xhigh"

[windows]
sandbox = "unelevated"

[tui]
status_line = ["model-with-reasoning", "current-dir", "reasoning", "project-name", "run-state", "context-remaining", "context-used", "five-hour-limit", "weekly-limit", "thread-title"]
status_line_use_colors = true

[features]
multi_agent = true
terminal_resize_reflow = true
memories = true
external_migration = true
prevent_idle_sleep = true
js_repl = false

[plugins."documents@openai-primary-runtime"]
enabled = true

[plugins."spreadsheets@openai-primary-runtime"]
enabled = true

[plugins."presentations@openai-primary-runtime"]
enabled = true

[plugins."browser@openai-bundled"]
enabled = true

[plugins."github@openai-curated"]
enabled = true

[memories]
disable_on_external_context = true
